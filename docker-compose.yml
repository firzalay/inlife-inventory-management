version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inlife_inventory_app
    restart: unless-stopped
    ports:
      - "8000:9000"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    working_dir: /var/www/html
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_NAME=InLife Inventory
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=inlife_inventory_management
      - DB_USERNAME=root
      - DB_PASSWORD=password
    networks:
      - laravel
    depends_on:
      - db
  nginx:
    image: nginx:alpine
    container_name: inlife_inventory_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel
    depends_on:
      - app
  db:
    image: mysql:9.1
    container_name: inlife_inventory_db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=inlife_inventory_management
      - MYSQL_ROOT_PASSWORD=password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  db_data:
    driver: local
