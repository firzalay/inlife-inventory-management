
server {
    listen 80;
    server_name inlifeinventory.my.id www.inlifeinventory.my.id;
    return 301 https://$host$request_uri;
}


server {
    listen 443 ssl;
    server_name inlifeinventory.my.id www.inlifeinventory.my.id;

    # Menggunakan sertifikat untuk domain Anda
    ssl_certificate /etc/letsencrypt/live/inlifeinventory.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inlifeinventory.my.id/privkey.pem;

    root /var/www/html/public;
    index index.php index.html;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    client_max_body_size 100M;
    
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ { 
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffering off;
    }
}
